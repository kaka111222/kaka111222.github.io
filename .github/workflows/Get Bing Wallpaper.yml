name: 16:30 获取壁纸 bing 

on:
  schedule:
    - cron: '30 8 * * *'
  push:
    paths:
      - '.github/**'
  workflow_dispatch:

jobs:
  get_today_wallpaper:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: main  # ✅ 改为 main
        fetch-depth: 0

    - name: Configure Git
      run: |
        git config --local user.email "fankaijiang@163.com"
        git config --local user.name "kaka111222"
        git config pull.rebase false

    - name: Pull latest changes BEFORE creating files
      run: |
        echo "先拉取最新远程更改..."
        git pull origin main  # ✅ 改为 main
        echo "✅ 已拉取最新远程更改"

    # ... 中间步骤保持不变 ...

    - name: Commit and Push Changes
      run: |
        git add bing/bing.jpg
        
        if git status --porcelain | grep -q "M\|A"; then
          DATE=$(date +'%Y年%m月%d日')
          IMAGE_RES=$(identify -format "%wx%h" bing/bing.jpg 2>/dev/null || echo "1920x1080")
          IMAGE_SIZE=$(du -h bing/bing.jpg | cut -f1)
          
          COMMIT_MSG="更新必应壁纸 [$DATE] (${IMAGE_RES} - ${IMAGE_SIZE})"
          git commit -m "$COMMIT_MSG"
          git push origin main  # ✅ 改为 main
          
          echo "✅ 壁纸已更新并压缩成功！"
          echo "📁 文件信息:"
          echo "  - 位置: bing/bing.jpg"
          echo "  - 分辨率: ${IMAGE_RES}"
          echo "  - 大小: ${IMAGE_SIZE}"
        else
          echo "没有文件被修改，跳过提交"
        fi

    # 部署步骤保持不变
    - name: Setup Pages
      uses: actions/configure-pages@v5
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
