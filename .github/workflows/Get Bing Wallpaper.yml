name: 16:30 获取壁纸 bing 

on:
  schedule:
    - cron: '30 8 * * *'  # 每天 UTC 8:30 (北京时间 16:30)
  push:
    paths:
      - '.github/**'
  workflow_dispatch:

jobs:
  get_today_wallpaper:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: master
        fetch-depth: 0

    - name: Configure Git
      run: |
        git config --local user.email "fankaijiang@hotmail.com"
        git config --local user.name "kaka111222333"
        git config pull.rebase false

    - name: Pull latest changes BEFORE creating files
      run: |
        echo "先拉取最新远程更改..."
        git pull origin master
        echo "✅ 已拉取最新远程更改"

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq wget curl imagemagick
        convert --version

    - name: Create directories
      run: |
        mkdir -p bing

    - name: Download and Compress Today's Bing Wallpaper
      run: |
        JSON_RESPONSE=$(curl -sL "https://www.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1&mkt=en-US")
        
        IMAGE_BASE_URL=$(echo "$JSON_RESPONSE" | jq -r '.images[0].url')
        TITLE=$(echo "$JSON_RESPONSE" | jq -r '.images[0].title')
        DATE=$(date +'%Y-%m-%d')
        
        FULL_IMAGE_URL="https://www.bing.com${IMAGE_BASE_URL/1920x1080/UHD}"
        
        echo "正在下载必应每日壁纸: $FULL_IMAGE_URL"
        echo "标题: $TITLE"
        
        # 下载UHD版本
        wget -q -O bing_uhd.jpg "$FULL_IMAGE_URL"
        
        # 检查原始文件大小
        UHD_SIZE=$(stat -f%z bing_uhd.jpg 2>/dev/null || stat -c%s bing_uhd.jpg 2>/dev/null)
        echo "UHD图片大小: $((UHD_SIZE/1024/1024)) MB"
        
        # 压缩为1920x1080
        echo "压缩图片为1920x1080分辨率..."
        convert bing_uhd.jpg -resize 1920x1080\> -quality 85 bing/bing.jpg
        
        # 检查压缩后文件大小
        COMPRESSED_SIZE=$(stat -f%z bing/bing.jpg 2>/dev/null || stat -c%s bing/bing.jpg 2>/dev/null)
        echo "压缩后大小: $((COMPRESSED_SIZE/1024)) KB"
        echo "压缩率: $(( (UHD_SIZE - COMPRESSED_SIZE) * 100 / UHD_SIZE ))%"
        
        # 清理临时文件
        rm -f bing_uhd.jpg
        
        # 显示压缩后的图片信息
        IMAGE_INFO=$(identify bing/bing.jpg 2>/dev/null || echo "无法获取图片信息")
        echo "压缩后图片信息: $IMAGE_INFO"
        echo "分辨率: $(identify -format "%wx%h" bing/bing.jpg 2>/dev/null || echo "1920x1080")"

    - name: Commit and Push Changes
      run: |
        # 只添加 bing.jpg
        git add bing/bing.jpg
        
        # 检查文件是否被修改
        if git status --porcelain | grep -q "M\|A"; then
          DATE=$(date +'%Y年%m月%d日')
          IMAGE_RES=$(identify -format "%wx%h" bing/bing.jpg 2>/dev/null || echo "1920x1080")
          IMAGE_SIZE=$(du -h bing/bing.jpg | cut -f1)
          
          COMMIT_MSG="更新必应壁纸 [$DATE] (${IMAGE_RES} - ${IMAGE_SIZE})"
          git commit -m "$COMMIT_MSG"
          git push origin master
          
          echo "✅ 壁纸已更新并压缩成功！"
          echo "📁 文件信息:"
          echo "  - 位置: bing/bing.jpg"
          echo "  - 分辨率: ${IMAGE_RES}"
          echo "  - 大小: ${IMAGE_SIZE}"
        else
          echo "没有文件被修改，跳过提交"
        fi

    # 部署到 GitHub Pages
    - name: Setup Pages
      uses: actions/configure-pages@v5
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4