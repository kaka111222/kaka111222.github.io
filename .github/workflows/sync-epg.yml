name: 同步 EPG 数据

on:
  schedule:
    # 每天 UTC 8:00 = 北京时间 16:00
    - cron: '0 8 * * *'
  # 支持手动触发
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-epg:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      # 步骤1：检出仓库
      - name: 检出代码
        uses: actions/checkout@v4

      # 步骤2：创建 epg 目录
      - name: 创建 epg 目录
        run: mkdir -p ./epg

      # 步骤3：下载 EPG 文件
      - name: 下载 seven-days.xml.gz
        run: |
          curl -L -o ./epg/seven-days.xml.gz \
            https://raw.githubusercontent.com/plsy1/epg/main/e/seven-days.xml.gz
          echo "文件下载完成："
          ls -lh ./epg/seven-days.xml.gz

      # 步骤4：配置 Git
      - name: 配置 Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      # 步骤5：提交并推送
      - name: 提交并推送
        run: |
          # 添加文件到暂存区
          git add ./epg/seven-days.xml.gz
          
          # 检查是否有变更需要提交
          if git diff --cached --quiet; then
            echo "文件内容没有变化，跳过提交"
          else
            echo "检测到文件变化，准备提交..."
            git commit -m "自动更新 EPG 数据 - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push origin HEAD:master
            echo "推送完成！"
          fi
