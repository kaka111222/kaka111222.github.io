name: 同步 EPG 数据

on:
  schedule:
    # 每天 16:00 (UTC+8) 运行，对应 UTC 时间 8:00
    - cron: '0 8 * * *'
  # 支持手动触发，方便测试
  workflow_dispatch:

jobs:
  sync-epg:
    runs-on: ubuntu-latest
    
    # 允许 GitHub Actions 推送代码到仓库
    permissions:
      contents: write
    
    steps:
      # 步骤1：检出仓库
      - name: 检出代码
        uses: actions/checkout@v4

      # 步骤2：创建 epg 目录（如果不存在）
      - name: 创建 epg 目录
        run: mkdir -p ./epg

      # 步骤3：下载 EPG 文件
      - name: 下载 seven-days.xml.gz
        run: |
          curl -L -o ./epg/seven-days.xml.gz \
            https://raw.githubusercontent.com/plsy1/epg/main/e/seven-days.xml.gz
          
          # 显示文件大小，用于确认下载成功
          ls -lh ./epg/seven-days.xml.gz

      # 步骤4：配置 Git
      - name: 配置 Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      # 步骤5：提交并推送
      - name: 提交并推送
        run: |
          # 检查是否有变更
          if git diff --quiet && git diff --staged --quiet; then
            echo "没有检测到文件变更，跳过提交"
            exit 0
          fi
          
          # 添加文件到暂存区
          git add ./epg/seven-details.xml.gz
          
          # 提交变更
          git commit -m "自动更新 EPG 数据 - $(date -u '+%Y-%m-%d %H:%M:%S UTC')" || echo "无变更需要提交"
          
          # 推送到远程仓库
          git push origin HEAD:master
